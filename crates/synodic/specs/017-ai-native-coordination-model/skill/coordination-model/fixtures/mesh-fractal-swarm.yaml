playbook:
  name: mesh-fractal-swarm
  domain: research-analysis
  description: Build shared knowledge graph, decompose problem recursively, then swarm-explore leaf hypotheses.
  stages:
    - name: knowledge-graph
      primitive: context-mesh
      config:
        propagation: reactive
        conflict_strategy: compete-and-compare
        agent_subscriptions:
          - watch_pattern: "papers/**"
            production_target: "graph/"
      trigger: manual
      lifecycle: persistent
      budget:
        max_agents: 4
        max_cost: 80
        max_time: "1h"

    - name: decompose
      primitive: fractal-decomposition
      config:
        split_strategy: "by-research-question"
        max_depth: 3
        max_children_per_level: 4
        reunification: lossless-merge
        scope_isolation: true
      trigger: auto
      lifecycle: one-shot
      budget:
        max_agents: 15
        max_cost: 150
        max_time: "45m"

    - name: hypothesis-explore
      primitive: speculative-swarm
      config:
        strategies: ["conventional", "contrarian", "cross-domain"]
        convergence_threshold: 0.6
        merge_strategy: weighted-blend
        budget:
          max_agents: 6
          max_cost: 120
          max_time: "30m"
      trigger: auto
      lifecycle: one-shot
      budget:
        max_agents: 6
        max_cost: 120
        max_time: "30m"

  composition_rules:
    - outer: knowledge-graph
      inner: hypothesis-explore
      binding: "Gap detection in mesh triggers swarm exploration of unknown regions"
