playbook:
  name: swarm-in-swarm
  domain: test
  description: Anti-pattern test — nesting speculative swarm inside speculative swarm causes N×M explosion.
  stages:
    - name: outer-swarm
      primitive: speculative-swarm
      config:
        strategies: ["a", "b", "c"]
        convergence_threshold: 0.5
        merge_strategy: winner-take-all
        budget:
          max_agents: 6
          max_cost: 100
          max_time: "20m"
      budget:
        max_agents: 6
        max_cost: 100
        max_time: "20m"

    - name: inner-swarm
      primitive: speculative-swarm
      config:
        strategies: ["x", "y"]
        convergence_threshold: 0.8
        merge_strategy: fragment-fusion
        budget:
          max_agents: 4
          max_cost: 50
          max_time: "10m"
      budget:
        max_agents: 4
        max_cost: 50
        max_time: "10m"

  composition_rules:
    - outer: outer-swarm
      inner: inner-swarm
      binding: "Each outer fork spawns an inner swarm"
