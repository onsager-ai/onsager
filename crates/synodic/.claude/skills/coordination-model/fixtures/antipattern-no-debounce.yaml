playbook:
  name: no-debounce-stigmergic
  domain: test
  description: Anti-pattern test — stigmergic stage without reaction_debounce risks reaction storms.
  stages:
    - name: watcher
      primitive: stigmergic
      config:
        agent_subscriptions:
          - watch_pattern: "src/**"
            production_target: "fixes/"
        marker_types: ["stale"]
        marker_decay: "30m"
        # reaction_debounce intentionally missing
      budget:
        max_agents: 3
        max_cost: 50
        max_time: "2h"
