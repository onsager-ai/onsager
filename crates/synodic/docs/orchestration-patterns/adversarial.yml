name: adversarial
description: "Generative-adversarial loop — escalating quality hardening"
config:
  max_rounds: 5
  static_rework_cap: 2
  consecutive_clean_threshold: 2
  plateau_rounds: 3
  critic_modes:
    - syntax-and-types
    - edge-cases
    - concurrency-safety
    - adversarial-inputs
    - semantic-analysis

steps:
  - name: adversarial-loop
    type: fan
    mode: loop
    max_iterations: 5
    termination:
      consecutive_clean: 2
      plateau_rounds: 3
    steps:
      - name: generate
        type: agent
        prompt: skills/adversarial/prompts/generate.md
        tools: [Read, Edit, Write, Bash, Glob, Grep]
        max_turns: 50
        isolation: worktree
        output_schema: schemas/generate-report.json
        context:
          spec_path: ${spec.path}

      - name: static-gate
        type: run
        check: [preflight]
        match: ["*.rs", "*.ts", "*.py"]
        retry: 2

      - name: attack
        type: agent
        prompt: skills/adversarial/prompts/attack.md
        tools: [Read, Glob, Grep, Bash]
        max_turns: 30
        output_schema: schemas/attack-report.json
        context:
          generate_output: ${steps.generate.output}

  - name: create-pr
    type: run
    command: |
      git push -u origin HEAD &&
      gh pr create --title "adversarial: ${spec.path}" --body "Automated adversarial pipeline output"
