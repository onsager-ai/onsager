# Per-slot dev stack (spec #194). One compose project per worktree.
#
# Required env (loaded from worktrees/<name>/.env.slot — generated by
# `xtask slot env <name>` and `just worktree-new`):
#
#   ONSAGER_SLOT             slot number (1..=99; 0 reserved for main)
#   ONSAGER_SLOT_NAME        worktree name
#   ONSAGER_COMPOSE_PROJECT  onsager-slot{N}
#   ONSAGER_POSTGRES_VOLUME  postgres-slot{N}
#   ONSAGER_TARGET_VOLUME    target-slot{N}
#   SLOT_EDGE_PORT           9000 + 10*N + 0
#   SLOT_POSTGRES_PORT       9000 + 10*N + 1
#
# Usage (via just recipes — see justfile):
#   docker compose -f deploy/dev/docker-compose.slot.yml \
#                  --project-directory <worktree> \
#                  -p $ONSAGER_COMPOSE_PROJECT up -d
#
# Source on the host is bind-mounted read-write into every service so
# edits propagate live. cargo target/ + sccache + node_modules live in
# named volumes so the host tree is never touched from the container.

name: ${ONSAGER_COMPOSE_PROJECT:?ONSAGER_COMPOSE_PROJECT must be set — source .env.slot}

x-rust-dev: &rust-dev
  build:
    context: ../..
    dockerfile: deploy/dev/rust.Dockerfile
  image: onsager-rust-dev:local
  # Bind mount the repo root read-write. The two named volumes (target +
  # sccache) shadow the host paths so cargo never writes to ./target on
  # the host.
  volumes:
    - ../..:/work:cached
    - cargo-target:/work/target
    - onsager-sccache:/sccache
  working_dir: /work
  # gdb/lldb attach require ptrace + an unconfined seccomp profile. Both
  # are dev-only — production images don't carry these.
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  init: true

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onsager
      POSTGRES_PASSWORD: onsager
      POSTGRES_DB: onsager
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Only the postgres port is exposed to the VM host directly so SQL
      # clients (psql, DataGrip) can connect via SSH-forward. Service-to-
      # service traffic stays on the compose network.
      - "${SLOT_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onsager"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../../crates/onsager-spine/migrations:/migrations:ro
    environment:
      PGPASSWORD: onsager
    entrypoint: >
      sh -c "
        set -e;
        for f in /migrations/*.sql; do
          echo \"==> applying $$f\";
          psql -X -v ON_ERROR_STOP=1 -h db -U onsager -d onsager -f \"$$f\";
        done
      "
    restart: "no"

  stiglab:
    <<: *rust-dev
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      STIGLAB_HOST: 0.0.0.0
      STIGLAB_PORT: "3000"
      ONSAGER_DATABASE_URL: postgres://onsager:onsager@db:5432/onsager
      DATABASE_URL: postgres://onsager:onsager@db:5432/onsager
      RUST_LOG: ${RUST_LOG:-info}
    command: >
      cargo watch -q -w crates/stiglab -w crates/onsager-spine -w crates/onsager-artifact
      -x 'run -p stiglab -- server'

  synodic:
    <<: *rust-dev
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://onsager:onsager@db:5432/onsager
      RUST_LOG: ${RUST_LOG:-info}
    command: >
      cargo watch -q -w crates/synodic -w crates/onsager-spine -w crates/onsager-artifact
      -x 'run -p synodic -- serve'

  forge:
    <<: *rust-dev
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      FORGE_PORT: "3003"
      DATABASE_URL: postgres://onsager:onsager@db:5432/onsager
      RUST_LOG: ${RUST_LOG:-info}
    command: >
      cargo watch -q -w crates/forge -w crates/onsager-spine -w crates/onsager-artifact
      -w crates/onsager-warehouse
      -x 'run -p forge -- serve'

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/dev/dashboard.Dockerfile
    image: onsager-dashboard-dev:local
    volumes:
      - ../..:/work:cached
      # node_modules in a per-container volume so native modules
      # (esbuild, rollup) match the container's libc.
      - dashboard-node-modules:/work/node_modules
      - dashboard-app-node-modules:/work/apps/dashboard/node_modules
    working_dir: /work
    environment:
      # Vite reads this and points the browser-side HMR WebSocket at the
      # slot's edge port (which Caddy proxies to this service).
      VITE_HMR_CLIENT_PORT: ${SLOT_EDGE_PORT}
      # Allow any host header — Caddy forwards "localhost:90X0" as-is.
      VITE_HOST: 0.0.0.0
    init: true
    command: >
      sh -c "pnpm install --filter dashboard --frozen-lockfile &&
             pnpm --filter dashboard exec vite --host 0.0.0.0 --port 5173"

  edge:
    image: caddy:2-alpine
    depends_on:
      - stiglab
      - synodic
      - forge
      - dashboard
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      SLOT_EDGE_PORT: ${SLOT_EDGE_PORT}
    ports:
      - "${SLOT_EDGE_PORT}:${SLOT_EDGE_PORT}"

volumes:
  # Per-slot — `name:` interpolated from .env.slot so two slots never
  # share a postgres volume or a cargo target dir at the docker level,
  # even though the compose-file aliases (left side) are fixed.
  postgres-data:
    name: ${ONSAGER_POSTGRES_VOLUME:?ONSAGER_POSTGRES_VOLUME must be set — source .env.slot}
  cargo-target:
    name: ${ONSAGER_TARGET_VOLUME:?ONSAGER_TARGET_VOLUME must be set — source .env.slot}
  # Shared across slots — sccache hits compound the more slots build.
  onsager-sccache:
    name: onsager-sccache
  dashboard-node-modules: {}
  dashboard-app-node-modules: {}
