name: rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      onsager-spine: ${{ steps.filter.outputs.onsager-spine }}
      forge: ${{ steps.filter.outputs.forge }}
      ising: ${{ steps.filter.outputs.ising }}
      stiglab: ${{ steps.filter.outputs.stiglab }}
      synodic: ${{ steps.filter.outputs.synodic }}
      onsager: ${{ steps.filter.outputs.onsager }}
      workspace: ${{ steps.filter.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workspace:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            onsager-spine:
              - 'crates/onsager-spine/**'
              - '!crates/onsager-spine/**/*.md'
              - '!crates/onsager-spine/.claude/**'
            forge:
              - 'crates/forge/**'
              - '!crates/forge/**/*.md'
              - '!crates/forge/.claude/**'
              - 'crates/onsager-spine/**'
              - '!crates/onsager-spine/**/*.md'
              - '!crates/onsager-spine/.claude/**'
            ising:
              - 'crates/ising/**'
              - '!crates/ising/**/*.md'
              - '!crates/ising/.claude/**'
              - 'crates/onsager-spine/**'
              - '!crates/onsager-spine/**/*.md'
              - '!crates/onsager-spine/.claude/**'
            stiglab:
              - 'crates/stiglab/**'
              - '!crates/stiglab/**/*.md'
              - '!crates/stiglab/.claude/**'
              - 'crates/onsager-spine/**'
              - '!crates/onsager-spine/**/*.md'
              - '!crates/onsager-spine/.claude/**'
            synodic:
              - 'crates/synodic/**'
              - '!crates/synodic/**/*.md'
              - '!crates/synodic/.claude/**'
              - 'crates/onsager-spine/**'
              - '!crates/onsager-spine/**/*.md'
              - '!crates/onsager-spine/.claude/**'
            onsager:
              - 'crates/onsager/**'
              - '!crates/onsager/**/*.md'
              - '!crates/onsager/.claude/**'

  check:
    needs: changes
    if: |
      needs.changes.outputs.workspace == 'true' ||
      needs.changes.outputs.onsager-spine == 'true' ||
      needs.changes.outputs.forge == 'true' ||
      needs.changes.outputs.ising == 'true' ||
      needs.changes.outputs.stiglab == 'true' ||
      needs.changes.outputs.synodic == 'true' ||
      needs.changes.outputs.onsager == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Apply database migrations
        run: |
          psql "$DATABASE_URL" -f crates/onsager-spine/migrations/001_initial.sql
          psql "$DATABASE_URL" -f crates/onsager-spine/migrations/002_artifacts.sql
          psql "$DATABASE_URL" -f crates/onsager-spine/migrations/003_artifacts_git_context.sql
          psql "$DATABASE_URL" -f crates/onsager-spine/migrations/004_artifact_pipeline.sql
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      - name: Test onsager-spine (serial — shares DB)
        run: cargo test -p onsager-spine -- --test-threads=1
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      - name: Test remaining crates
        run: cargo test --workspace --exclude onsager-spine
