name: rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      onsager-spine: ${{ steps.filter.outputs.onsager-spine }}
      forge: ${{ steps.filter.outputs.forge }}
      ising: ${{ steps.filter.outputs.ising }}
      stiglab: ${{ steps.filter.outputs.stiglab }}
      synodic: ${{ steps.filter.outputs.synodic }}
      onsager: ${{ steps.filter.outputs.onsager }}
      workspace: ${{ steps.filter.outputs.workspace }}
      xtask: ${{ steps.filter.outputs.xtask }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workspace:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            onsager-spine:
              - 'crates/onsager-spine/**'
            forge:
              - 'crates/forge/**'
              - 'crates/onsager-spine/**'
            ising:
              - 'crates/ising/**'
              - 'crates/onsager-spine/**'
            stiglab:
              - 'crates/stiglab/**'
              - 'crates/onsager-spine/**'
            synodic:
              - 'crates/synodic/**'
              - 'crates/onsager-spine/**'
            onsager:
              - 'crates/onsager/**'
            xtask:
              - 'xtask/**'
              - 'docs/events.md'
              # Lever F (#151) — the api-contract lint reads these plus
              # stiglab/synodic mod.rs, so changes on either side must
              # re-trigger the xtask job.
              - 'apps/dashboard/src/lib/api.ts'
              - 'apps/dashboard/src/lib/sse.ts'

  check:
    needs: changes
    if: |
      needs.changes.outputs.workspace == 'true' ||
      needs.changes.outputs.onsager-spine == 'true' ||
      needs.changes.outputs.forge == 'true' ||
      needs.changes.outputs.ising == 'true' ||
      needs.changes.outputs.stiglab == 'true' ||
      needs.changes.outputs.synodic == 'true' ||
      needs.changes.outputs.onsager == 'true' ||
      needs.changes.outputs.xtask == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Verify docs/events.md is in sync with FactoryEventKind
        run: cargo run -p xtask --quiet -- gen-event-docs --check
      - name: Seam-rule lint (ADR 0004 / spec #131 Lever B)
        run: cargo run -p xtask --quiet -- lint-seams
      - name: API/UI contract lint (spec #131 Lever F / #151)
        run: cargo run -p xtask --quiet -- check-api-contract
      - name: Event-type registry manifest check (spec #131 Lever E / #150)
        run: cargo run -p xtask --quiet -- check-events
      - name: File-budget check (spec #261, warn-only mode)
        run: cargo run -p xtask --quiet -- check-file-budget --mode=warn
      - name: Apply database migrations
        run: |
          for f in crates/onsager-spine/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      - name: Test onsager-spine (serial — shares DB)
        run: cargo test -p onsager-spine -- --test-threads=1
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      - name: Test stiglab (serial — Lever D #149 routes write the spine schema)
        run: cargo test -p stiglab -- --test-threads=1
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      - name: Test remaining crates
        run: cargo test --workspace --exclude onsager-spine --exclude stiglab
