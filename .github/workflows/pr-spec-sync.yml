name: pr-spec-sync

# Check that every non-trivial PR links a spec issue. Status-label
# sync (`draft` / `planned` / `in-progress`) was removed when the
# label lifecycle was retired — issue open/closed is the only state.

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNum = pr.number;
            const body = pr.body || '';

            const closingRe = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi;
            const refRe = /\b(?:part\s+of|refs|related)\s+#(\d+)\b/gi;
            const grab = (re) => {
              const out = new Set();
              let m;
              while ((m = re.exec(body))) out.add(parseInt(m[1], 10));
              return [...out];
            };
            const linked = [...new Set([...grab(closingRe), ...grab(refRe)])];

            if (linked.length > 0) return;
            if (pr.labels.some(l => l.name === 'trivial')) return;

            const marker = '<!-- pr-spec-sync:no-spec-link -->';
            const iterator = github.paginate.iterator(
              github.rest.issues.listComments,
              { ...context.repo, issue_number: prNum, per_page: 100 },
            );
            for await (const { data: page } of iterator) {
              if (page.some(c => (c.body || '').includes(marker))) return;
            }
            await github.rest.issues.createComment({
              ...context.repo, issue_number: prNum,
              body: `${marker}\nThis PR does not link a spec issue. Per the Onsager dev process, please either:\n` +
                "- Edit the PR body to add `Closes #N` or `Part of #N` pointing at a spec issue, or\n" +
                "- Apply the `trivial` label if this is a typo/doc-only fix that doesn't warrant a spec.\n\n" +
                "See the `onsager-dev-process` and `issue-spec` skills for details.",
            });
