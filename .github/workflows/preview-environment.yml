name: preview-environment

# Attaches PR previews to Railway's native PR Environments feature.
#
# Railway itself creates the ephemeral environment (named `pr-<number>`) and
# the forked Postgres plugin when a PR is opened — those are configured in
# the Railway dashboard, not here. This workflow's job is the glue:
#
#   - resolve the preview URL once Railway reports a successful deploy
#   - post/update a sticky PR comment with the URL and smoke-test status
#   - run a lightweight smoke test against the preview
#   - acknowledge teardown when the PR closes
#
# The preview env is torn down by Railway automatically on PR close. We do
# not delete anything ourselves.
#
# Fork PRs are skipped outright: GITHUB_TOKEN is read-only for them (so
# comment upserts would 403) and repo secrets aren't injected into
# `pull_request`-triggered runs from forks, so the announce step couldn't
# query Railway anyway. Running nothing is the honest outcome.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  announce:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ]; then
            echo "::warning::RAILWAY_TOKEN / RAILWAY_PROJECT_ID not configured — skipping preview URL announcement"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Railway preview deploy
        if: steps.secrets.outputs.configured == 'true'
        id: wait
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME || 'onsager' }}
        run: |
          # Poll up to ~10 minutes. Railway builds the full Rust workspace on
          # a fresh env, which commonly takes 4–7 minutes. Exit 2 from the
          # script means "not ready, retry" — any other non-zero is a hard
          # failure (bad token, GraphQL error, jq parse error) and we bail
          # early with the diagnostic surfaced, rather than silently
          # spinning for the full 10 minutes.
          attempts=60
          sleep_s=10
          stderr_file=$(mktemp)
          trap 'rm -f "$stderr_file"' EXIT
          for i in $(seq 1 $attempts); do
            if url=$(scripts/preview-url.sh 2>"$stderr_file"); then
              echo "url=$url" >> "$GITHUB_OUTPUT"
              echo "Preview ready: $url"
              exit 0
            fi
            status=$?
            if [ "$status" -eq 2 ]; then
              echo "[$i/$attempts] preview not ready yet; sleeping ${sleep_s}s"
              sleep $sleep_s
              continue
            fi
            echo "::error::scripts/preview-url.sh failed with exit code $status"
            cat "$stderr_file" >&2 || true
            exit "$status"
          done
          echo "::warning::Timed out waiting for preview deploy"
          echo "Last preview-url.sh stderr:" >&2
          cat "$stderr_file" >&2 || true
          echo "url=" >> "$GITHUB_OUTPUT"

      - name: Smoke-test /api/health
        if: steps.wait.outputs.url != ''
        id: smoke
        run: |
          url="${{ steps.wait.outputs.url }}"
          # Retry a few times — the healthcheck can lag the deploy-success event.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$url/api/health" || true)
            if [ "$code" = "200" ]; then
              echo "status=ok" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "status=failed" >> "$GITHUB_OUTPUT"

      - name: Upsert preview comment
        if: always() && steps.secrets.outputs.configured == 'true'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.wait.outputs.url }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.status }}
        with:
          script: |
            const marker = '<!-- onsager-preview -->';
            const url = process.env.PREVIEW_URL || '';
            const smoke = process.env.SMOKE_STATUS || 'unknown';

            const body = url
              ? [
                  marker,
                  '### Preview environment',
                  '',
                  `| | |`,
                  `|---|---|`,
                  `| URL | ${url} |`,
                  `| Dashboard | ${url}/ |`,
                  `| Health | ${url}/api/health |`,
                  `| Smoke | \`${smoke}\` |`,
                  '',
                  `Postgres is a fresh plugin fork — migrations run automatically at boot. The environment is torn down when this PR closes.`,
                ].join('\n')
              : [
                  marker,
                  '### Preview environment',
                  '',
                  'Preview deploy did not report ready within the timeout. Check the Railway project for the `pr-' + context.issue.number + '` environment, or inspect this workflow run.',
                ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              const existing = comments.find(c => c.body && c.body.startsWith(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              // Downgrade 403s (e.g. restricted org settings) to warnings —
              // the comment is informational; don't red-X the workflow for it.
              if (error && (error.status === 403 || error.response?.status === 403)) {
                core.warning('Skipping preview comment: workflow token lacks permission to write PR comments.');
                return;
              }
              throw error;
            }

  teardown-notice:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Mark preview as torn down
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- onsager-preview -->';
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              const existing = comments.find(c => c.body && c.body.startsWith(marker));
              if (!existing) return;
              const body = [
                marker,
                '### Preview environment',
                '',
                'Torn down — the `pr-' + context.issue.number + '` environment and its Postgres plugin have been released by Railway.',
              ].join('\n');
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } catch (error) {
              if (error && (error.status === 403 || error.response?.status === 403)) {
                core.warning('Skipping teardown comment: workflow token lacks permission to write PR comments.');
                return;
              }
              throw error;
            }
