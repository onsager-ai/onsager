# Onsager — Railway config-as-code.
#
# Unified single-container deployment. All subsystems run in one service:
#
#   Process         | Description                               | Port
#   --------------- | ----------------------------------------- | ----
#   stiglab         | Sessions, agents, dashboard, API          | 3000 (exposed)
#   synodic         | Governance API (internal)                 | 3001 (proxied)
#   onsager-portal  | GitHub webhook ingress (internal)         | 3002 (proxied)
#   PostgreSQL      | Shared event spine (Railway plugin)       | 5432
#
# Stiglab is the front door — it serves the dashboard, its own API, and
# reverse-proxies /api/governance/* to synodic on localhost:3001 and
# /webhooks/github to onsager-portal on localhost:3002. The portal runs its
# own migrations (factory_tasks, pr_gate_verdicts, pr_branch_links) at
# startup.
#
# Quick start:
#   1. Create a Railway project and connect this repo
#   2. Add a PostgreSQL plugin (auto-provides DATABASE_URL)
#   3. Default service uses this config (builds stiglab + synodic + portal)
#   4. Set required variables (see [deploy] section below)
#   5. Point your GitHub App webhook at
#      https://<app>.up.railway.app/webhooks/github
#
# Migrations:
#   The entrypoint auto-applies onsager-spine and synodic migrations on
#   startup when ONSAGER_DATABASE_URL is set. The portal applies its own
#   tables when it boots.

# =============================================================================
# Stiglab — primary service (sessions + dashboard + agent runner)
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "crates/stiglab/deploy/Dockerfile"
watchPatterns = [
    # All crates — every workspace member is linked into at least one of
    # the binaries shipped in this unified container (stiglab, synodic,
    # onsager-portal), so any change can affect the deploy.
    "crates/**",
    "apps/dashboard/**",
    "Cargo.toml",
    "Cargo.lock",
    "pnpm-lock.yaml",
]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Required environment variables (set in Railway dashboard):
#
#   DATABASE_URL              — auto-injected by Railway Postgres plugin
#   ONSAGER_DATABASE_URL      — set to ${{Postgres.DATABASE_URL}} (spine migrations + event bus)
#   STIGLAB_CREDENTIAL_KEY    — 32-byte hex AES-256-GCM key (openssl rand -hex 32)
#   PORT                      — auto-injected by Railway (stiglab reads STIGLAB_PORT)
#
# Optional:
#
#   STIGLAB_NODE_NAME         — runner node identifier (default: main)
#   STIGLAB_MAX_SESSIONS      — max concurrent agent sessions (default: 4)
#   STIGLAB_AGENT_COMMAND     — CLI binary for agents (default: claude)
#   STIGLAB_PUBLIC_URL        — public URL for OAuth callbacks (e.g. https://<app>.up.railway.app)
#   STIGLAB_WEBHOOK_BASE_URL  — override for the stiglab webhook base URL.
#                               Takes precedence over RAILWAY_PUBLIC_DOMAIN
#                               and forwarded headers. Set this when the
#                               public origin differs from the Railway-
#                               assigned domain (custom domain, multi-host
#                               split, etc.).
#   GITHUB_CLIENT_ID          — GitHub OAuth app client ID
#   GITHUB_CLIENT_SECRET      — GitHub OAuth app client secret
#
# Cross-environment SSO (owner side — prod only):
#   The preview environments piggy-back off prod's GitHub OAuth app via a
#   back-channel exchange. Prod registers a single OAuth callback with
#   GitHub; previews delegate to prod over HTTPS. Set these on prod only —
#   they must NOT be set on preview environments.
#
#   SSO_STATE_SECRET            — HMAC secret signing the OAuth `state`
#                                 envelope (≥ 32 random bytes).
#   SSO_EXCHANGE_SECRET         — shared bearer token: previews present
#                                 this to POST /api/auth/sso/redeem.
#   SSO_RETURN_HOST_ALLOWLIST   — comma-separated. Entries may be a strict
#                                 subdomain pattern (`*.preview.onsager.ai`)
#                                 or an exact host (`app.onsager.ai`).
#                                 Any `return_to` whose host is not listed
#                                 is rejected at the start of the flow.
#   SYNODIC_PORT              — internal port for synodic (default: 3001)
#   PORTAL_PORT               — internal port for onsager-portal (default: 3002)
#   GITHUB_TOKEN              — optional PAT used by the portal for posting
#                               check runs / comments when installation-token
#                               signing isn't wired up yet
#
# Webhook base URL resolution (stiglab decides where github.com should
# deliver repo webhooks). First non-empty layer wins:
#   1. STIGLAB_WEBHOOK_BASE_URL / STIGLAB_PUBLIC_BASE_URL
#   2. RAILWAY_PUBLIC_DOMAIN (Railway auto-injects this — no action needed
#      on standard single-service deploys)
#   3. X-Forwarded-Proto + X-Forwarded-Host from the activation request,
#      gated on STIGLAB_TRUST_FORWARDED_HEADERS=1
# An unresolved chain fails workflow activation loudly (503) — there is
# no silent localhost default. Production typically relies on layer 2 and
# does NOT set STIGLAB_TRUST_FORWARDED_HEADERS (defense in depth: if the
# public origin ever changes unexpectedly, fail rather than trust the
# request).

# =============================================================================
# Preview (per-PR) environments
# =============================================================================
#
# Railway's PR Environments feature creates an ephemeral environment for each
# open pull request, using this config plus a forked Postgres plugin. Each
# preview gets its own Railway-generated domain and is torn down automatically
# when the PR is closed or merged.
#
# Enable once in the Railway dashboard:
#   Project Settings → Pull Request Environments → Enabled
#                    → Wait for check: deploy-ready
# Postgres forks as a fresh empty instance per PR by default — volume data
# is not copied unless explicitly opted in.
#
# After enabling, `.github/workflows/preview-environment.yml` reacts to the
# `deployment_status` event Railway's GitHub App emits on successful deploy
# — it reads the preview URL from the event payload, smoke-tests
# `/api/health`, and upserts a sticky PR comment. No Railway API token is
# required in CI (project tokens are environment-locked and can't see
# ephemeral PR envs anyway).
#
# Preview-specific overrides: smaller footprint, faster failure, no restart
# storms. The preview entrypoint still auto-runs migrations on the fresh DB
# (see crates/stiglab/deploy/entrypoint.sh) so no additional bootstrap is
# required.

[environments.preview.deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

# Preview-only variable defaults. Secrets (CREDENTIAL_KEY, OAuth client
# secrets, GITHUB_TOKEN) are inherited from the project-level shared vars;
# anything here is a safe, non-sensitive default that distinguishes a preview
# deploy from production at runtime.
#
# Per-PR uniqueness for the node name comes from Railway's runtime-injected
# `RAILWAY_ENVIRONMENT_NAME` (e.g. `pr-42`). Railway's variables system
# resolves `${{...}}` references at deploy time, not TOML parse time — the
# GitHub Actions `github.*` context is NOT available here.
[environments.preview.variables]
STIGLAB_NODE_NAME = "${{RAILWAY_ENVIRONMENT_NAME}}"
STIGLAB_MAX_SESSIONS = "2"
ONSAGER_PREVIEW = "true"
# Preview deploys run behind Railway's edge proxy, which rewrites the
# X-Forwarded-* headers authoritatively. Trusting them here lets the
# dashboard drive workflow activation without the operator having to set
# STIGLAB_WEBHOOK_BASE_URL per-PR. Production deliberately leaves this
# unset — see the webhook resolution notes above.
STIGLAB_TRUST_FORWARDED_HEADERS = "1"

# Cross-environment SSO (relying side).
#
# Previews never talk to GitHub directly. `/api/auth/github` on a preview
# 302s to `${SSO_AUTH_DOMAIN}/api/auth/github?return_to=…`; prod runs the
# OAuth dance against its single registered callback, then hands back an
# opaque one-shot code via `${return_to}?code=…` which `/api/auth/sso/finish`
# redeems server-to-server with `SSO_EXCHANGE_SECRET` as Bearer.
#
# SSO_EXCHANGE_SECRET must equal the value set on prod and must be kept as
# a shared secret (configure via the Railway dashboard, NOT in the TOML).
# GITHUB_CLIENT_ID/SECRET must NOT be set on preview environments — the
# startup assertion panics if both owner and relying credentials are
# present, to catch config confusion early.
SSO_AUTH_DOMAIN = "${{SSO_AUTH_DOMAIN}}"
SSO_EXCHANGE_SECRET = "${{SSO_EXCHANGE_SECRET}}"
